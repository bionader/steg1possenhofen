<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circular border -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#E8732A" stroke-width="1.5" opacity="0.3"/>

  <!-- POSSENHOFEN text - top arc -->
  <defs>
    <path id="topArc" d="M 35,100 A 65,65 0 0,1 165,100" fill="none"/>
  </defs>
  <text font-family="'DM Sans', sans-serif" font-size="10" font-weight="500" letter-spacing="3.5" fill="#1A1A14">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">POSSENHOFEN</textPath>
  </text>

  <!-- Steg 1 main text -->
  <text x="100" y="108" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="52" font-weight="600" font-style="italic" fill="#1A1A14">Steg 1</text>

  <!-- Paddle / Oar icon -->
  <g transform="translate(100, 52) rotate(-30)">
    <!-- Paddle shaft -->
    <rect x="-2" y="-20" width="4" height="40" rx="2" fill="#E8732A"/>
    <!-- Paddle blade -->
    <ellipse cx="0" cy="-28" rx="6" ry="14" fill="#E8732A"/>
  </g>

  <!-- BEACH CLUB text - bottom arc -->
  <defs>
    <path id="bottomArc" d="M 40,110 A 65,65 0 0,0 160,110" fill="none"/>
  </defs>
  <text font-family="'DM Sans', sans-serif" font-size="9.5" font-weight="500" letter-spacing="3" fill="#1A1A14">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BEACH CLUB</textPath>
  </text>

  <!-- Small decorative dots -->
  <circle cx="52" cy="102" r="2" fill="#E8732A"/>
  <circle cx="148" cy="102" r="2" fill="#E8732A"/>
</svg>
