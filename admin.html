<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Steg 1 Possenhofen</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#E8732A 0%,#F4EDD8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{background:white;border-radius:20px;box-shadow:0 12px 48px rgba(0,0,0,.12);max-width:520px;width:100%;padding:36px;position:relative;overflow:hidden}
    .container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#E8732A,#F4A261,#E8732A)}
    h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:#18180F;margin-bottom:4px}
    .subtitle{color:#7A7668;margin-bottom:24px;font-size:.88rem}
    .form-group{margin-bottom:14px}
    label{display:block;color:#4A4840;font-weight:500;margin-bottom:6px;font-size:.85rem}
    input[type="password"],input[type="email"],input[type="text"]{width:100%;padding:11px 14px;border:1.5px solid #E6D9B8;border-radius:10px;font-family:inherit;font-size:.95rem;transition:border-color .2s}
    input:focus{outline:none;border-color:#E8732A}
    button{width:100%;padding:11px;background:#E8732A;color:white;border:none;border-radius:100px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    button:hover{background:#D4641F;transform:translateY(-1px)}
    button:disabled{background:#CCC;cursor:not-allowed;transform:none}
    .dashboard{display:none}
    .message{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:.88rem;text-align:center}
    .message.success{background:#D4EDDA;color:#155724}
    .message.error{background:#F8D7DA;color:#721C24}
    .logout-row{display:flex;justify-content:flex-end;margin-bottom:20px}
    .logout-btn{width:auto;padding:8px 20px;background:#7A7668;font-size:.82rem;border-radius:100px}
    .logout-btn:hover{background:#4A4840}

    /* Calendar */
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .cal-header h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#18180F}
    .cal-hint{font-size:.75rem;color:#7A7668}
    .day-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .day-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;background:#FDFAF4;border:1.5px solid #F0E8D6;transition:all .2s;position:relative}
    .day-card.today{border-color:#E8732A;background:linear-gradient(135deg,rgba(232,115,42,.04),rgba(232,115,42,.08));box-shadow:0 2px 12px rgba(232,115,42,.1)}
    .day-card.past{opacity:.5}
    .day-info{flex:1;min-width:0}
    .day-name{font-weight:600;font-size:.9rem;color:#18180F}
    .day-date{font-size:.75rem;color:#7A7668;margin-top:1px}
    .day-card.today .day-name::after{content:'HEUTE';font-size:.6rem;background:#E8732A;color:white;padding:2px 7px;border-radius:20px;margin-left:8px;font-weight:600;letter-spacing:.04em;vertical-align:middle}
    .day-note{font-size:.72rem;color:#7A7668;font-style:italic;margin-top:2px}

    /* Toggle Switch */
    .toggle{position:relative;width:52px;height:28px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle .slider{position:absolute;inset:0;background:#D94F4F;border-radius:28px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
    .toggle .slider::before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:white;border-radius:50%;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .toggle input:checked+.slider{background:#34D058}
    .toggle input:checked+.slider::before{transform:translateX(24px)}
    .toggle input:disabled+.slider{opacity:.4;cursor:not-allowed}

    /* Note input */
    .note-input{width:100%;padding:6px 10px;border:1px solid #E6D9B8;border-radius:8px;font-family:inherit;font-size:.75rem;margin-top:4px;transition:border-color .2s}
    .note-input:focus{outline:none;border-color:#E8732A}
    .note-input::placeholder{color:#B8AE9C}

    .save-row{display:flex;gap:10px}
    .save-row button{flex:1}
    .btn-secondary{background:#7A7668}
    .btn-secondary:hover{background:#4A4840}

    .spinner{display:inline-block;width:12px;height:12px;border:2px solid #E8732A;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:500px){
      .container{padding:24px 20px;border-radius:16px}
      h1{font-size:1.8rem}
      .day-card{padding:12px}
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login -->
    <div id="login">
      <h1>Admin</h1>
      <p class="subtitle">Steg 1 Possenhofen</p>
      <div id="login-message"></div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="E-Mail eingeben">
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Passwort eingeben">
      </div>
      <button type="button" id="btn-login">Anmelden</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <div class="logout-row">
        <button type="button" class="logout-btn" id="btn-logout">Abmelden</button>
      </div>
      <div class="cal-header">
        <h2>Wochenplaner</h2>
        <span class="cal-hint">Toggle = offen/geschlossen</span>
      </div>
      <div id="message"></div>
      <div class="day-grid" id="day-grid"></div>
      <div class="save-row">
        <button type="button" id="btn-save">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    var SB_URL='https://tdnnfmfaymnzukjhoidq.supabase.co';
    var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkbm5mbWZheW1uenVramhvaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODEzNTMsImV4cCI6MjA5MDM1NzM1M30.xS-xcS6Ds1Rtaz_7qh24arNPQ2EDgH6AtDZAONqvLIg';
    var token='';
    var failedAttempts=0;
    var DAYS_DE=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    var DAYS_SHORT=['So','Mo','Di','Mi','Do','Fr','Sa'];

    function msg(text,type,target){
      var el=document.getElementById(target||'message');
      el.className='message '+(type||'success');
      el.textContent=text;
      setTimeout(function(){el.textContent='';el.className='';},3500);
    }

    function dateStr(d){
      var y=d.getFullYear();
      var m=String(d.getMonth()+1).padStart(2,'0');
      var dd=String(d.getDate()).padStart(2,'0');
      return y+'-'+m+'-'+dd;
    }

    function formatDate(d){
      return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();
    }

    // Generate 10 days: 3 past + today + 6 future
    function getDays(){
      var days=[];
      var now=new Date();
      for(var i=-3;i<=6;i++){
        var d=new Date(now);
        d.setDate(d.getDate()+i);
        days.push({
          date:dateStr(d),
          dateObj:d,
          dayName:DAYS_DE[d.getDay()],
          dayShort:DAYS_SHORT[d.getDay()],
          formatted:formatDate(d),
          isToday:i===0,
          isPast:i<0
        });
      }
      return days;
    }

    function defaultOpen(d){
      var day=d.getDay(),h=12;
      return(day>=1&&day<=5)||(day===0||day===6);
    }

    // Build calendar UI
    function buildCalendar(schedule){
      var grid=document.getElementById('day-grid');
      grid.innerHTML='';
      var days=getDays();

      days.forEach(function(day){
        var existing=schedule.find(function(s){return s.date===day.date});
        var isOpen=existing?existing.is_open:defaultOpen(day.dateObj);
        var note=existing?existing.note||'':'';

        var card=document.createElement('div');
        card.className='day-card'+(day.isToday?' today':'')+(day.isPast?' past':'');
        card.dataset.date=day.date;

        var info=document.createElement('div');
        info.className='day-info';
        info.innerHTML='<div class="day-name">'+day.dayName+'</div><div class="day-date">'+day.formatted+'</div>';

        if(!day.isPast){
          var noteInput=document.createElement('input');
          noteInput.type='text';
          noteInput.className='note-input';
          noteInput.placeholder='Notiz (z.B. Schlechtwetter)';
          noteInput.value=note;
          noteInput.dataset.date=day.date;
          info.appendChild(noteInput);
        }else if(note){
          info.innerHTML+='<div class="day-note">'+note+'</div>';
        }

        var toggle=document.createElement('label');
        toggle.className='toggle';
        var cb=document.createElement('input');
        cb.type='checkbox';
        cb.checked=isOpen;
        cb.dataset.date=day.date;
        if(day.isPast)cb.disabled=true;
        var slider=document.createElement('span');
        slider.className='slider';
        toggle.appendChild(cb);
        toggle.appendChild(slider);

        card.appendChild(info);
        card.appendChild(toggle);
        grid.appendChild(card);
      });
    }

    // Load schedule from Supabase
    function loadSchedule(){
      var days=getDays();
      var minDate=days[0].date;
      var maxDate=days[days.length-1].date;

      fetch(SB_URL+'/rest/v1/daily_schedule?date=gte.'+minDate+'&date=lte.'+maxDate+'&order=date',{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
      })
      .then(function(r){return r.json()})
      .then(function(data){
        if(Array.isArray(data))buildCalendar(data);
        else buildCalendar([]);
      })
      .catch(function(){buildCalendar([])});
    }

    // Save schedule to Supabase
    document.getElementById('btn-save').addEventListener('click',function(){
      var btn=this;
      btn.disabled=true;
      btn.textContent='Speichern...';

      var checkboxes=document.querySelectorAll('.day-card:not(.past) input[type="checkbox"]');
      var notes=document.querySelectorAll('.note-input');
      var noteMap={};
      notes.forEach(function(n){noteMap[n.dataset.date]=n.value});

      var records=[];
      checkboxes.forEach(function(cb){
        records.push({
          date:cb.dataset.date,
          is_open:cb.checked,
          note:noteMap[cb.dataset.date]||''
        });
      });

      // Upsert all records
      fetch(SB_URL+'/rest/v1/daily_schedule',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SB_KEY,
          'Authorization':'Bearer '+token,
          'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify(records)
      })
      .then(function(r){
        if(!r.ok)throw new Error('Save failed');
        msg('Wochenplan gespeichert!');
        loadSchedule();
      })
      .catch(function(){
        msg('Fehler beim Speichern','error');
      })
      .finally(function(){
        btn.disabled=false;
        btn.textContent='Speichern';
      });

      // Cleanup: Delete entries older than 4 days
      var cutoff=new Date();
      cutoff.setDate(cutoff.getDate()-4);
      fetch(SB_URL+'/rest/v1/daily_schedule?date=lt.'+dateStr(cutoff),{
        method:'DELETE',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
      });
    });

    // Login
    document.getElementById('btn-login').addEventListener('click',function(){
      var email=document.getElementById('email').value;
      var password=document.getElementById('password').value;
      var btn=this;
      if(!email||!password){msg('Bitte E-Mail und Passwort eingeben','error','login-message');return}
      if(failedAttempts>=3){
        var w=Math.min(Math.pow(2,failedAttempts-2)*5,60);
        msg('Zu viele Versuche. Bitte '+w+'s warten.','error','login-message');
        btn.disabled=true;
        setTimeout(function(){btn.disabled=false;btn.textContent='Anmelden'},w*1000);
        return;
      }
      btn.disabled=true;btn.textContent='Anmelden...';
      fetch(SB_URL+'/auth/v1/token?grant_type=password',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY},
        body:JSON.stringify({email:email,password:password})
      })
      .then(function(r){
        if(!r.ok){failedAttempts++;msg('Falsches Passwort oder E-Mail!','error','login-message');btn.disabled=false;btn.textContent='Anmelden';return null}
        return r.json();
      })
      .then(function(data){
        if(!data||!data.access_token)return;
        token=data.access_token;
        failedAttempts=0;
        document.getElementById('login').style.display='none';
        document.getElementById('dashboard').style.display='block';
        loadSchedule();
        btn.disabled=false;btn.textContent='Anmelden';
      })
      .catch(function(){msg('Verbindungsfehler','error','login-message');btn.disabled=false;btn.textContent='Anmelden'});
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click',function(){
      fetch(SB_URL+'/auth/v1/logout',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
      }).finally(function(){
        token='';
        document.getElementById('login').style.display='block';
        document.getElementById('dashboard').style.display='none';
        document.getElementById('password').value='';
      });
    });
  </script>
</body>
</html>
