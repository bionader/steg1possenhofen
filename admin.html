<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Steg 1 Possenhofen</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#2A7B6F 0%,#F2EBD9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{background:white;border-radius:20px;box-shadow:0 12px 48px rgba(0,0,0,.12);max-width:600px;width:100%;padding:36px;position:relative;overflow:hidden}
    .container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#D94F4F,#E8735A,#D94F4F)}
    .admin-badge{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;color:#D94F4F;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:block}
    h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:#18180F;margin-bottom:4px}
    .subtitle{color:#7A7668;margin-bottom:24px;font-size:.88rem}
    .form-group{margin-bottom:14px}
    label{display:block;color:#4A4840;font-weight:500;margin-bottom:6px;font-size:.85rem}
    input[type="password"],input[type="email"],input[type="text"]{width:100%;padding:11px 14px;border:1.5px solid #E6D9B8;border-radius:10px;font-family:inherit;font-size:.95rem;transition:border-color .2s}
    input:focus{outline:none;border-color:#2A7B6F}
    button{width:100%;padding:11px;background:#2A7B6F;color:white;border:none;border-radius:100px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    button:hover{background:#1F6358;transform:translateY(-1px)}
    button:disabled{background:#CCC;cursor:not-allowed;transform:none}
    .dashboard{display:none}
    .message{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:.88rem;text-align:center}
    .message.success{background:#D4EDDA;color:#155724}
    .message.error{background:#F8D7DA;color:#721C24}
    .logout-row{display:flex;justify-content:flex-end;margin-bottom:20px}
    .logout-btn{width:auto;padding:8px 20px;background:#7A7668;font-size:.82rem;border-radius:100px}
    .logout-btn:hover{background:#4A4840}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .cal-header h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#18180F}
    .cal-hint{font-size:.72rem;color:#7A7668}
    .day-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}

    .day-card{padding:14px 16px;border-radius:14px;background:#FDFBF7;border:1.5px solid #F0E8D6;transition:all .2s}
    .day-card.today{border-color:#2A7B6F;background:linear-gradient(135deg,rgba(42,123,111,.04),rgba(42,123,111,.08));box-shadow:0 2px 12px rgba(42,123,111,.1)}
    .day-card.past{opacity:.45;pointer-events:none}
    .day-card.is-closed{background:#FBF5F5;border-color:#E8D0D0}

    .day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
    .day-top.has-details{margin-bottom:10px}
    .day-info{flex:1}
    .day-name{font-weight:600;font-size:.9rem;color:#18180F}
    .day-date{font-size:.73rem;color:#7A7668;margin-top:1px}
    .day-card.today .day-name::after{content:'HEUTE';font-size:.58rem;background:#2A7B6F;color:white;padding:2px 7px;border-radius:20px;margin-left:8px;font-weight:600;letter-spacing:.04em;vertical-align:middle}

    .day-details{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .time-group{display:flex;align-items:center;gap:6px}
    .time-label{font-size:.72rem;color:#7A7668;font-weight:500}
    .time-input{width:110px;padding:8px 10px;border:1.5px solid #E6D9B8;border-radius:8px;font-family:inherit;font-size:.95rem;text-align:center;transition:border-color .2s}
    .time-input:focus{outline:none;border-color:#2A7B6F}
    .time-sep{font-size:.82rem;color:#B8AE9C;font-weight:300}

    .note-input{flex:1;min-width:120px;padding:6px 10px;border:1.5px solid #E6D9B8;border-radius:8px;font-family:inherit;font-size:.75rem;transition:border-color .2s}
    .note-input:focus{outline:none;border-color:#2A7B6F}
    .note-input::placeholder{color:#B8AE9C}
    .day-note{font-size:.72rem;color:#7A7668;font-style:italic;margin-top:6px}

    .day-closed-info{font-size:.78rem;color:#D94F4F;font-weight:500;margin-top:4px}

    /* Toggle */
    .toggle{position:relative;width:48px;height:26px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle .slider{position:absolute;inset:0;background:#D94F4F;border-radius:26px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
    .toggle .slider::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .toggle input:checked+.slider{background:#34D058}
    .toggle input:checked+.slider::before{transform:translateX(22px)}
    .toggle input:disabled+.slider{opacity:.4;cursor:not-allowed}

    .save-row{display:flex;gap:10px}
    .save-row button{flex:1}

    /* Tab navigation */
    .tab-nav{display:flex;gap:4px;margin-bottom:20px;border-bottom:1.5px solid #F0E8D6;padding-bottom:0}
    .tab-btn{padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;font-size:.88rem;color:#7A7668;cursor:pointer;transition:all .2s;font-weight:500}
    .tab-btn:hover{color:#18180F}
    .tab-btn.active{color:#2A7B6F;border-bottom-color:#2A7B6F;font-weight:600}
    .tab-content{display:none}
    .tab-content.active{display:block}

    /* SUP Calendar */
    .sup-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .sup-cal-nav h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem}
    .sup-cal-nav button{background:none;border:1.5px solid #E6D9B8;border-radius:100px;padding:6px 14px;font-family:inherit;font-size:.82rem;cursor:pointer;color:#4A4840;width:auto}
    .sup-cal-nav button:hover{border-color:#2A7B6F;color:#2A7B6F;background:none}
    .sup-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
    .sup-cal-head{font-size:.68rem;color:#7A7668;text-align:center;padding:6px 0;font-weight:500}
    .sup-cal-day{padding:8px 4px;border-radius:10px;text-align:center;font-size:.82rem;border:1.5px solid #F0E8D6;background:#FDFBF7;cursor:pointer;transition:all .2s;min-height:60px}
    .sup-cal-day.past{opacity:.35;pointer-events:none}
    .sup-cal-day.empty{border:none;pointer-events:none}
    .sup-cal-day.today{border-color:#2A7B6F}
    .sup-cal-day.open{border-color:#34D058;background:rgba(52,208,88,.06)}
    .sup-cal-day.closed{border-color:#D94F4F;background:rgba(217,79,79,.06)}
    .sup-cal-day .day-num{font-weight:600;margin-bottom:2px}
    .sup-cal-day .day-status{font-size:.6rem;font-weight:500}
    .sup-cal-day.open .day-status{color:#34D058}
    .sup-cal-day.closed .day-status{color:#D94F4F}
    .sup-cal-day .day-bookings{font-size:.58rem;color:#7A7668;margin-top:2px}
    .sup-cal-day.selected{box-shadow:0 0 0 2px #2A7B6F;border-color:#2A7B6F}
    .sup-detail{margin-top:16px;padding:16px;background:#FDFBF7;border-radius:14px;border:1.5px solid #F0E8D6}
    .sup-detail h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;margin-bottom:12px}
    .sup-booking-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0E8D6;font-size:.82rem;flex-wrap:wrap;gap:6px}
    .sup-booking-item:last-child{border-bottom:none}
    .sup-booking-cancel{background:#D94F4F;color:white;border:none;border-radius:100px;padding:4px 12px;font-size:.72rem;cursor:pointer;font-family:inherit;width:auto}
    .sup-booking-cancel:hover{background:#C0392B}
    .sup-no-bookings{font-size:.82rem;color:#7A7668;font-style:italic}
    .sup-day-toggle{margin-top:12px;display:flex;align-items:center;gap:10px;font-size:.85rem}

    .menu-cat{margin-bottom:16px;background:#FDFBF7;border-radius:14px;border:1.5px solid #F0E8D6;overflow:hidden;transition:transform .2s}
    .menu-cat.moving{transform:scale(.98);box-shadow:0 4px 20px rgba(42,123,111,.12)}
    .menu-cat-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#F7F0E6}
    .menu-cat-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#1A2421;font-weight:600;flex:1}
    .menu-cat-actions{display:flex;gap:4px}
    .menu-cat-actions button{background:none;border:1px solid #E4D9C4;border-radius:6px;padding:4px 8px;font-size:.75rem;cursor:pointer;font-family:inherit;color:#4A5652;transition:all .2s;width:auto;line-height:1}
    .menu-cat-actions button:hover{border-color:#2A7B6F;color:#2A7B6F;background:none}
    .menu-cat-actions button.del:hover{border-color:#D94F4F;color:#D94F4F;background:none}
    .menu-cat-actions button.move{font-size:.9rem;padding:2px 6px}
    .menu-cat-body{padding:0 16px 12px}
    .menu-item-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #F0E8D6}
    .menu-item-row:last-child{border-bottom:none}
    .menu-item-move{display:flex;flex-direction:column;gap:1px}
    .menu-item-move button{background:none;border:none;color:#B8AE9C;cursor:pointer;font-size:.65rem;padding:0 3px;line-height:1;width:auto;transition:color .15s}
    .menu-item-move button:hover{color:#2A7B6F;background:none}
    .menu-item-fields{flex:1;display:flex;gap:6px;align-items:center;flex-wrap:wrap;min-width:0}
    .menu-item-input{padding:5px 8px;border:1.5px solid #E4D9C4;border-radius:8px;font-family:inherit;font-size:.82rem;transition:border-color .2s}
    .menu-item-input:focus{outline:none;border-color:#2A7B6F}
    .menu-item-input.name{flex:2;min-width:100px}
    .menu-item-input.desc{flex:2;min-width:80px;color:#7A8580}
    .menu-item-input.price{width:90px;text-align:right}
    .menu-item-del{background:none;border:none;color:#B8AE9C;cursor:pointer;font-size:1.1rem;padding:4px;transition:color .2s;width:auto}
    .menu-item-del:hover{color:#D94F4F;background:none}
    .menu-add-item{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;color:#2A7B6F;font-size:.8rem;font-weight:500;border:none;background:none;font-family:inherit;width:auto}
    .menu-add-item:hover{color:#1F6358;background:none}
    .menu-add-cat{display:flex;align-items:center;gap:6px;padding:10px 16px;cursor:pointer;color:#2A7B6F;font-size:.85rem;font-weight:500;border:1.5px dashed #E4D9C4;border-radius:14px;background:none;font-family:inherit;margin-top:12px;width:100%;justify-content:center;transition:all .2s}
    .menu-add-cat:hover{border-color:#2A7B6F;background:rgba(42,123,111,.04)}
    .menu-section-title{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#2A7B6F;margin:24px 0 12px;padding-top:16px;border-top:2px solid #E4D9C4}
    .menu-section-title:first-child{margin-top:0;padding-top:0;border-top:none}
.bs-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0E8D6;cursor:pointer;transition:background .15s;font-size:.85rem}
.bs-row:last-child{border-bottom:none}
.bs-row:hover{background:rgba(42,123,111,.03)}
.bs-row.bs-active{background:rgba(42,123,111,.05)}
.bs-check{width:18px;height:18px;accent-color:#2A7B6F;cursor:pointer;flex-shrink:0}
.bs-name{flex:1;color:#1A2421}
.bs-desc{color:#7A8580;font-size:.78rem}
.bs-price{color:#D4883A;font-weight:500;white-space:nowrap}

    @media(max-width:500px){
      .container{padding:24px 18px;border-radius:16px}
      h1{font-size:1.8rem}
      .day-card{padding:12px}
      .day-details{gap:6px}
      .time-input{width:105px;font-size:.9rem}
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login">
      <span class="admin-badge">Admin Panel</span>
      <h1>Steg 1 Possenhofen</h1>
      <p class="subtitle">Anmelden um die Website zu verwalten</p>
      <div id="login-message"></div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="E-Mail eingeben">
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Passwort eingeben">
      </div>
      <button type="button" id="btn-login">Anmelden</button>
    </div>

    <div class="dashboard" id="dashboard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span class="admin-badge" style="margin-bottom:0">Admin Panel</span>
        <button type="button" class="logout-btn" id="btn-logout">Abmelden</button>
      </div>

      <div class="tab-nav" id="tab-nav">
        <button class="tab-btn active" data-tab="schedule" id="tab-schedule">Öffnungszeiten</button>
        <button class="tab-btn" data-tab="sup" id="tab-sup">SUP-Buchungen</button>
        <button class="tab-btn" data-tab="menu" id="tab-menu">Speisekarte</button>
        <button class="tab-btn" data-tab="bestseller" id="tab-bestseller">Bestseller</button>
      </div>

      <!-- Tab 1: Öffnungszeiten (existing content) -->
      <div class="tab-content active" id="content-schedule">
        <div class="cal-header">
          <h2>Wochenplaner</h2>
          <span class="cal-hint">Rot = ganzer Tag geschlossen</span>
        </div>
        <div id="message"></div>
        <div class="day-grid" id="day-grid"></div>
        <div class="save-row">
          <button type="button" id="btn-save">Speichern</button>
        </div>
      </div>

      <!-- Tab 2: SUP-Buchungen -->
      <div class="tab-content" id="content-sup">
        <div class="cal-header">
          <h2>SUP-Kalender</h2>
        </div>
        <div id="sup-message"></div>
        <div id="sup-cal"></div>
        <div id="sup-day-detail"></div>
      </div>

      <!-- Tab 3: Speisekarte -->
      <div class="tab-content" id="content-menu">
        <div class="cal-header">
          <h2>Speisekarte bearbeiten</h2>
          <span class="cal-hint">Artikel per Drag & Drop verschieben</span>
        </div>
        <div id="menu-message"></div>
        <div id="menu-editor"></div>
        <div class="save-row" style="margin-top:16px">
          <button type="button" id="btn-save-menu">Alle Änderungen speichern</button>
        </div>
      </div>

      <!-- Tab 4: Bestseller -->
      <div class="tab-content" id="content-bestseller">
        <div class="cal-header">
          <h2>Bestseller auswählen</h2>
          <span class="cal-hint">Auf der Startseite angezeigte Artikel</span>
        </div>
        <div id="bs-message"></div>
        <div id="bs-editor"></div>
      </div>
    </div>
  </div>

  <script>
    var SB_URL='https://tdnnfmfaymnzukjhoidq.supabase.co';
    var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkbm5mbWZheW1uenVramhvaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODEzNTMsImV4cCI6MjA5MDM1NzM1M30.xS-xcS6Ds1Rtaz_7qh24arNPQ2EDgH6AtDZAONqvLIg';
    var token='';
    var failedAttempts=0;
    // Sanitize user input to prevent XSS
    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    var DAYS_DE=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('content-' + this.dataset.tab).classList.add('active');
        if (this.dataset.tab === 'sup') loadSupCalendar();
        if (this.dataset.tab === 'menu') loadMenu();
        if (this.dataset.tab === 'bestseller') loadBestseller();
      });
    });

    function msg(text,type,target){
      var el=document.getElementById(target||'message');
      el.className='message '+(type||'success');el.textContent=text;
      setTimeout(function(){el.textContent='';el.className=''},3500);
    }

    function dateStr(d){
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }

    function fmtDate(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear()}

    function defaultTimes(){
      return{open:'10:00',close:'20:00'};
    }

    function getDays(){
      var days=[],now=new Date();
      for(var i=-1;i<=6;i++){
        var d=new Date(now);d.setDate(d.getDate()+i);
        days.push({date:dateStr(d),dateObj:d,dayName:DAYS_DE[d.getDay()],formatted:fmtDate(d),isToday:i===0,isPast:i<0});
      }
      return days;
    }

    function buildCalendar(schedule){
      var grid=document.getElementById('day-grid');
      grid.innerHTML='';
      getDays().forEach(function(day){
        var s=schedule.find(function(r){return r.date===day.date});
        var def=defaultTimes(day.dateObj);
        var openTime=s?s.open_time||def.open:def.open;
        var closeTime=s?s.close_time||def.close:def.close;
        var closedAllDay=s?s.closed_all_day:false;
        var isOpen=s?s.is_open:true;
        var note=s?s.note||'':'';

        // Trim seconds from time
        openTime=openTime.substring(0,5);
        closeTime=closeTime.substring(0,5);

        var card=document.createElement('div');
        card.className='day-card'+(day.isToday?' today':'')+(day.isPast?' past':'')+(closedAllDay?' is-closed':'');
        card.dataset.date=day.date;

        var top=document.createElement('div');
        top.className='day-top'+(day.isPast?'':' has-details');

        var info=document.createElement('div');
        info.className='day-info';
        info.innerHTML='<div class="day-name">'+day.dayName+'</div><div class="day-date">'+day.formatted+'</div>';
        top.appendChild(info);

        // Toggle (open/closed all day)
        var toggle=document.createElement('label');
        toggle.className='toggle';
        toggle.title=closedAllDay?'Ganzer Tag geschlossen':'Ge\u00f6ffnet';
        var cb=document.createElement('input');
        cb.type='checkbox';
        cb.checked=!closedAllDay;
        cb.dataset.date=day.date;
        if(day.isPast)cb.disabled=true;
        var slider=document.createElement('span');
        slider.className='slider';
        toggle.appendChild(cb);
        toggle.appendChild(slider);
        top.appendChild(toggle);

        card.appendChild(top);

        // Details row (only for non-past, non-closed days)
        if(!day.isPast){
          var details=document.createElement('div');
          details.className='day-details';
          details.dataset.date=day.date;

          if(closedAllDay){
            details.innerHTML='<span class="day-closed-info">Ganzer Tag geschlossen</span>';
          }else{
            // Time inputs
            var tg=document.createElement('div');
            tg.className='time-group';
            tg.innerHTML='<span class="time-label">Von</span>'
              +'<input type="time" class="time-input open-time" value="'+openTime+'" data-date="'+day.date+'">'
              +'<span class="time-sep">&ndash;</span>'
              +'<span class="time-label">Bis</span>'
              +'<input type="time" class="time-input close-time" value="'+closeTime+'" data-date="'+day.date+'">';
            details.appendChild(tg);
          }

          // Note
          var noteInput=document.createElement('input');
          noteInput.type='text';
          noteInput.className='note-input';
          noteInput.placeholder='Notiz';
          noteInput.value=note;
          noteInput.dataset.date=day.date;
          details.appendChild(noteInput);

          card.appendChild(details);

          // Toggle handler: show/hide time inputs
          cb.addEventListener('change',function(){
            var date=this.dataset.date;
            var det=document.querySelector('.day-details[data-date="'+date+'"]');
            var c=this.closest('.day-card');
            if(!this.checked){
              c.classList.add('is-closed');
              var tg=det.querySelector('.time-group');
              if(tg)tg.remove();
              var ci=det.querySelector('.day-closed-info');
              if(!ci){
                var span=document.createElement('span');
                span.className='day-closed-info';
                span.textContent='Ganzer Tag geschlossen';
                det.insertBefore(span,det.firstChild);
              }
            }else{
              c.classList.remove('is-closed');
              var ci=det.querySelector('.day-closed-info');
              if(ci)ci.remove();
              var existingTg=det.querySelector('.time-group');
              if(!existingTg){
                var def2=defaultTimes(new Date(date+'T12:00:00'));
                var tg2=document.createElement('div');
                tg2.className='time-group';
                tg2.innerHTML='<span class="time-label">Von</span>'
                  +'<input type="time" class="time-input open-time" value="'+def2.open+'" data-date="'+date+'">'
                  +'<span class="time-sep">&ndash;</span>'
                  +'<span class="time-label">Bis</span>'
                  +'<input type="time" class="time-input close-time" value="'+def2.close+'" data-date="'+date+'">';

    // --- SUP Calendar ---
    var supYear, supMonth, supSelectedDate = null;
    var supClosedDays = [];
    var supBookings = {};

    function initSupCal() {
      var n = new Date();
      supYear = n.getFullYear();
      supMonth = n.getMonth();
    }

    function loadSupCalendar() {
      if (!supYear) initSupCal();
      var firstDay = supYear + '-' + String(supMonth+1).padStart(2,'0') + '-01';
      var lastDay = supYear + '-' + String(supMonth+1).padStart(2,'0') + '-' + new Date(supYear, supMonth+1, 0).getDate();

      Promise.all([
        fetch(SB_URL + '/rest/v1/sup_closed_days?date=gte.' + firstDay + '&date=lte.' + lastDay, {
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
        }).then(function(r) { return r.json(); }),
        fetch(SB_URL + '/rest/v1/bookings?date=gte.' + firstDay + '&date=lte.' + lastDay + '&status=eq.confirmed&select=date,start_time,end_time,board_count,customer_name,customer_phone,id,total_price', {
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
        }).then(function(r) { return r.json(); })
      ]).then(function(results) {
        supClosedDays = (results[0] || []).map(function(r) { return r.date; });
        supBookings = {};
        (results[1] || []).forEach(function(b) {
          if (!supBookings[b.date]) supBookings[b.date] = [];
          supBookings[b.date].push(b);
        });
        renderSupCalendar();
      }).catch(function() { renderSupCalendar(); });
    }

    function renderSupCalendar() {
      var months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      var dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
      var today = new Date(); today.setHours(0,0,0,0);

      var html = '<div class="sup-cal-nav">';
      html += '<button onclick="supPrevMonth()">&larr;</button>';
      html += '<h3>' + months[supMonth] + ' ' + supYear + '</h3>';
      html += '<button onclick="supNextMonth()">&rarr;</button>';
      html += '</div><div class="sup-cal-grid">';

      dayNames.forEach(function(d) { html += '<div class="sup-cal-head">' + d + '</div>'; });

      var firstDow = new Date(supYear, supMonth, 1).getDay();
      firstDow = firstDow === 0 ? 6 : firstDow - 1;
      var daysInMonth = new Date(supYear, supMonth + 1, 0).getDate();

      for (var i = 0; i < firstDow; i++) html += '<div class="sup-cal-day empty"></div>';

      for (var d = 1; d <= daysInMonth; d++) {
        var date = new Date(supYear, supMonth, d);
        var ds = dateStr(date);
        var isPast = date < today;
        var isClosed = supClosedDays.indexOf(ds) !== -1;
        var bookCount = supBookings[ds] ? supBookings[ds].length : 0;
        var sel = supSelectedDate === ds ? ' selected' : '';
        var todayClass = (date.getTime() === today.getTime()) ? ' today' : '';

        html += '<div class="sup-cal-day' + (isPast ? ' past' : '') + (isClosed ? ' closed' : ' open') + sel + todayClass + '" data-date="' + ds + '" onclick="supSelectDay(\'' + ds + '\')">';
        html += '<div class="day-num">' + d + '</div>';
        html += '<div class="day-status">' + (isClosed ? 'Zu' : 'Offen') + '</div>';
        if (bookCount > 0) html += '<div class="day-bookings">' + bookCount + ' Buchung' + (bookCount > 1 ? 'en' : '') + '</div>';
        html += '</div>';
      }

      html += '</div>';
      document.getElementById('sup-cal').innerHTML = html;

      // Re-show detail if day was selected
      if (supSelectedDate) showSupDayDetail(supSelectedDate);
    }

    function supPrevMonth() {
      supMonth--;
      if (supMonth < 0) { supMonth = 11; supYear--; }
      supSelectedDate = null;
      document.getElementById('sup-day-detail').innerHTML = '';
      loadSupCalendar();
    }

    function supNextMonth() {
      supMonth++;
      if (supMonth > 11) { supMonth = 0; supYear++; }
      supSelectedDate = null;
      document.getElementById('sup-day-detail').innerHTML = '';
      loadSupCalendar();
    }

    function supSelectDay(ds) {
      supSelectedDate = ds;
      renderSupCalendar();
      showSupDayDetail(ds);
    }

    function showSupDayDetail(ds) {
      var detail = document.getElementById('sup-day-detail');
      var d = new Date(ds + 'T12:00:00');
      var isClosed = supClosedDays.indexOf(ds) !== -1;
      var dayBookings = supBookings[ds] || [];

      var html = '<div class="sup-detail">';
      html += '<h3>' + DAYS_DE[d.getDay()] + ', ' + d.getDate() + '.' + (d.getMonth()+1) + '.' + d.getFullYear() + '</h3>';
      html += '<div class="sup-day-toggle">';
      html += '<label class="toggle"><input type="checkbox" ' + (isClosed ? '' : 'checked') + ' onchange="supToggleDay(\'' + ds + '\', this.checked)"><span class="slider"></span></label>';
      html += '<span>' + (isClosed ? 'Geschlossen für SUP' : 'Geöffnet für SUP') + '</span>';
      html += '</div>';

      if (dayBookings.length > 0) {
        html += '<h4 style="margin-top:16px;font-size:.88rem;font-weight:600">' + dayBookings.length + ' Buchung' + (dayBookings.length > 1 ? 'en' : '') + '</h4>';
        dayBookings.sort(function(a, b) { return a.start_time.localeCompare(b.start_time); });
        dayBookings.forEach(function(b) {
          html += '<div class="sup-booking-item">';
          html += '<div><strong>' + b.start_time.substring(0,5) + '–' + b.end_time.substring(0,5) + '</strong> · ' + b.board_count + ' Board' + (b.board_count > 1 ? 's' : '') + ' · ' + esc(b.customer_name) + ' · ' + esc(b.customer_phone) + '</div>';
          html += '<button class="sup-booking-cancel" onclick="supCancelBooking(\'' + b.id + '\',\'' + ds + '\')">Stornieren</button>';
          html += '</div>';
        });
      } else {
        html += '<p class="sup-no-bookings" style="margin-top:12px">Keine Buchungen für diesen Tag.</p>';
      }
      html += '</div>';
      detail.innerHTML = html;
    }

    function supToggleDay(ds, isOpen) {
      if (isOpen) {
        // Remove from closed days
        fetch(SB_URL + '/rest/v1/sup_closed_days?date=eq.' + ds, {
          method: 'DELETE',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
        }).then(function() { loadSupCalendar(); supSelectedDate = ds; });
      } else {
        // Add to closed days
        fetch(SB_URL + '/rest/v1/sup_closed_days', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ date: ds })
        }).then(function() { loadSupCalendar(); supSelectedDate = ds; });
      }
    }

    function supCancelBooking(bookingId, ds) {
      if (!confirm('Buchung wirklich stornieren?')) return;
      fetch(SB_URL + '/rest/v1/bookings?id=eq.' + bookingId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ status: 'cancelled' })
      }).then(function() {
        loadSupCalendar();
        setTimeout(function() { supSelectDay(ds); }, 500);
      });
    }

    // --- Menu Editor ---
    var menuData = [];

    function loadMenu() {
      fetch(SB_URL + '/rest/v1/menu_items?order=sort_order&select=id,category,section,name,description,price,sort_order', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }

        menuData = data || [];
        renderMenu();
      }).catch(function() { msg('Fehler beim Laden', 'error', 'menu-message'); });

    function renderMenu() {
      var editor = document.getElementById('menu-editor');
      if (!menuData.length) { editor.innerHTML = '<p style="color:#7A8580">Keine Einträge.</p>'; return; }

      var sections = {};
      menuData.forEach(function(item) {
        if (!sections[item.section]) sections[item.section] = {};
        if (!sections[item.section][item.category]) sections[item.section][item.category] = [];
        sections[item.section][item.category].push(item);
      });

      var sectionLabels = { 'speisen': 'Speisen', 'getraenke': 'Getränke' };
      var html = '';

      ['speisen', 'getraenke'].forEach(function(sec) {
        if (!sections[sec]) return;
        html += '<div class="menu-section-title">' + (sectionLabels[sec] || sec) + '</div>';
        html += '<div class="menu-section" data-section="' + sec + '">';
        var cats = Object.keys(sections[sec]);
        cats.forEach(function(cat) {
          var items = sections[sec][cat];
          html += '<div class="menu-cat" data-category="' + esc(cat) + '" data-section="' + sec + '">';
          html += '<div class="menu-cat-header">';
          html += '<div class="menu-cat-title">' + esc(cat) + '</div>';
          html += '<div class="menu-cat-actions">';
          html += '<button class="move" onclick="moveCat(this,-1)" title="Nach oben">▲</button>';
          html += '<button class="move" onclick="moveCat(this,1)" title="Nach unten">▼</button>';
          html += '<button onclick="renameCat(this)" title="Umbenennen">✏️</button>';
          html += '<button class="del" onclick="deleteCat(this)" title="Kategorie löschen">🗑</button>';
          html += '</div></div>';
          html += '<div class="menu-cat-body">';
          items.forEach(function(item) {
            html += renderItemRow(item);
          });
          html += '<button class="menu-add-item" onclick="addItem(this,\'' + sec + '\',\'' + esc(cat).replace(/'/g, "\\'") + '\')">+ Artikel hinzufügen</button>';
          html += '</div></div>';
        });
        html += '<button class="menu-add-cat" onclick="addCategory(\'' + sec + '\')">+ Neue Kategorie hinzufügen</button>';
        html += '</div>';
      });

      editor.innerHTML = html;
      // Move buttons handle reordering
    }

    function renderItemRow(item) {
      return '<div class="menu-item-row" data-id="' + item.id + '">' +
        '<div class="menu-item-move">' +
        '<button onclick="moveItem(this,-1)" title="Nach oben">▲</button>' +
        '<button onclick="moveItem(this,1)" title="Nach unten">▼</button>' +
        '</div>' +
        '<div class="menu-item-fields">' +
        '<input class="menu-item-input name" value="' + esc(item.name) + '" data-field="name" data-id="' + item.id + '" placeholder="Name">' +
        '<input class="menu-item-input desc" value="' + esc(item.description || '') + '" data-field="description" data-id="' + item.id + '" placeholder="Beschreibung">' +
        '<input class="menu-item-input price" value="' + esc(item.price) + '" data-field="price" data-id="' + item.id + '" placeholder="Preis">' +
        '</div>' +
        '<button class="menu-item-del" onclick="deleteItem(this,' + item.id + ')" title="Löschen">✕</button>' +
        '</div>';
    }

    // Add new item
    function addItem(btn, section, category) {
      var maxSort = 0;
      menuData.forEach(function(i) { if (i.sort_order > maxSort) maxSort = i.sort_order; });
      var newItem = { category: category, section: section, name: 'Neuer Artikel', description: '', price: '0,00 €', sort_order: maxSort + 1 };

      fetch(SB_URL + '/rest/v1/menu_items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Prefer': 'return=representation' },
        body: JSON.stringify(newItem)
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data && data.length) {
          menuData.push(data[0]);
          renderMenu();
          msg('Artikel hinzugefügt', 'success', 'menu-message');

      }).catch(function() { msg('Fehler', 'error', 'menu-message'); });

    // Add new category
    function addCategory(section) {
      var name = prompt('Name der neuen Kategorie:');
      if (!name || !name.trim()) return;
      var maxSort = 0;
      menuData.forEach(function(i) { if (i.sort_order > maxSort) maxSort = i.sort_order; });

      fetch(SB_URL + '/rest/v1/menu_items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Prefer': 'return=representation' },
        body: JSON.stringify(newItem)
      }).then(function(r) { return r.json(); }).then(function(data) {

          menuData.push(data[0]);
          renderMenu();

    // Rename category
    function renameCat(btn) {
      var cat = btn.closest('.menu-cat');
      var oldName = cat.dataset.category;
      var section = cat.dataset.section;
      var newName = prompt('Kategorie umbenennen:', oldName);
      if (!newName || !newName.trim() || newName.trim() === oldName) return;

      var ids = [];
      menuData.forEach(function(i) { if (i.category === oldName && i.section === section) ids.push(i.id); });

      Promise.all(ids.map(function(id) {
        return fetch(SB_URL + '/rest/v1/menu_items?id=eq.' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ category: newName.trim() })
        });
      })).then(function() {
        menuData.forEach(function(i) { if (i.category === oldName && i.section === section) i.category = newName.trim(); });
        renderMenu();
        msg('Kategorie umbenannt', 'success', 'menu-message');
      });
    }

    // Delete single item
    function deleteItem(btn, id) {
      if (!confirm('Artikel wirklich löschen?')) return;
      fetch(SB_URL + '/rest/v1/menu_items?id=eq.' + id, {
        method: 'DELETE',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }

    // Delete entire category

      var cat = btn.closest('.menu-cat');
      var catName = cat.dataset.category;
      var section = cat.dataset.section;
      if (!confirm('Gesamte Kategorie "' + catName + '" mit allen Artikeln löschen?')) return;

      var ids = [];
      menuData.forEach(function(i) { if (i.category === catName && i.section === section) ids.push(i.id); });

      Promise.all(ids.map(function(id) {
        return fetch(SB_URL + '/rest/v1/menu_items?id=eq.' + id, {
          method: 'DELETE',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
        });
      })).then(function() {
        menuData = menuData.filter(function(i) { return !(i.category === catName && i.section === section); });
        renderMenu();
        msg('Kategorie gelöscht', 'success', 'menu-message');

    // Drag and drop for items within a category
    // Move category up/down
    function moveCat(btn, dir) {
      var cat = btn.closest('.menu-cat');
      var parent = cat.parentElement;
      var allCats = Array.from(parent.querySelectorAll(':scope > .menu-cat'));
      var idx = allCats.indexOf(cat);
      var targetIdx = idx + dir;
      if (targetIdx < 0 || targetIdx >= allCats.length) return;
      cat.classList.add('moving');
      if (dir === -1) {
        parent.insertBefore(cat, allCats[targetIdx]);
      } else {
        parent.insertBefore(cat, allCats[targetIdx].nextSibling);
      }
      setTimeout(function() { cat.classList.remove('moving'); }, 200);
    }

    // Move item up/down within category
    function moveItem(btn, dir) {
      var row = btn.closest('.menu-item-row');
      var parent = row.parentElement;
      var allRows = Array.from(parent.querySelectorAll('.menu-item-row'));
      var idx = allRows.indexOf(row);
      var targetIdx = idx + dir;
      if (targetIdx < 0 || targetIdx >= allRows.length) return;
      if (dir === -1) {
        parent.insertBefore(row, allRows[targetIdx]);
      } else {
        parent.insertBefore(row, allRows[targetIdx].nextSibling);
      }
    }

    function loadBestseller() {
      fetch(SB_URL + '/rest/v1/menu_items?order=sort_order&select=id,category,section,name,description,price,is_bestseller', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (!data || !data.length) { document.getElementById('bs-editor').innerHTML = '<p style="color:#7A8580">Keine Artikel in der Speisekarte.</p>'; return; }
        renderBestseller(data);
      }).catch(function() { msg('Fehler beim Laden', 'error', 'bs-message'); });
    }

    function renderBestseller(data) {
      var editor = document.getElementById('bs-editor');
      var sectionLabels = { 'speisen': 'Essen', 'getraenke': 'Getränke' };
      var html = '';

      ['speisen', 'getraenke'].forEach(function(sec) {
        var items = data.filter(function(i) { return i.section === sec; });
        if (!items.length) return;
        html += '<div class="menu-section-title">' + sectionLabels[sec] + '</div>';
        var cats = {};
        items.forEach(function(i) {
          if (!cats[i.category]) cats[i.category] = [];
          cats[i.category].push(i);
        });
        Object.keys(cats).forEach(function(cat) {
          html += '<div class="menu-cat"><div class="menu-cat-header"><div class="menu-cat-title">' + esc(cat) + '</div></div>';
          html += '<div class="menu-cat-body">';
          cats[cat].forEach(function(item) {
            var checked = item.is_bestseller ? ' checked' : '';
            html += '<label class="bs-row' + (item.is_bestseller ? ' bs-active' : '') + '">';
            html += '<input type="checkbox" class="bs-check" data-id="' + item.id + '"' + checked + ' onchange="toggleBestseller(this)">';
            html += '<span class="bs-name">' + esc(item.name) + (item.description ? ' <span class="bs-desc">' + esc(item.description) + '</span>' : '') + '</span>';
            html += '<span class="bs-price">' + esc(item.price) + '</span>';
            html += '</label>';
          });
          html += '</div></div>';
        });
      });

      editor.innerHTML = html;
    }

    function toggleBestseller(cb) {
      var id = cb.dataset.id;
      var val = cb.checked;
      var row = cb.closest('.bs-row');
      if (val) row.classList.add('bs-active'); else row.classList.remove('bs-active');

      fetch(SB_URL + '/rest/v1/menu_items?id=eq.' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ is_bestseller: val })
      }).then(function(r) {
        if (!r.ok) throw new Error();
        msg(val ? 'Bestseller hinzugefügt' : 'Bestseller entfernt', 'success', 'bs-message');
      }).catch(function() {
        msg('Fehler beim Speichern', 'error', 'bs-message');
        cb.checked = !val;
        if (!val) row.classList.add('bs-active'); else row.classList.remove('bs-active');
      });
    }

  </script>
</body>
</html>
